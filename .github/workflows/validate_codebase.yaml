name: Validate Branch (lint & unittests)

permissions:
  contents: read

on:
  pull_request:

jobs:
  setup:
    runs-on: ubuntu-24.04
    steps:
      # Step 1: Checkout code with full history
      - name: Checkout code with full history
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch all history for all branches and tags

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'  # Adjust to your Python version

  verify_codebase:
    runs-on: ubuntu-24.04
    needs: [setup]  # Wait for setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      #: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.dev
          pip install pylint
          pip install coverage

      - name: Run Pylint
        env:
          PYTHONPATH: .
        run: |
          python -m pylint --fail-under=10.0 weaver_framework/*

      # Run tests and measure coverage
      - name: Run tests with coverage
        run: |
          coverage run -m unittest -v tests/common/main.py
          coverage report -m --fail-under=100
